    const letters = ['A', 'B', 'C', 'D', 'E'];
    const quiz = sourceQuestions.map(q => ({...q, choices:[...q.choices].sort(() => Math.random() - .5)}));
    let current = 0, score = 0, answered = false;
    const container = document.getElementById('quiz');
    const progress = document.getElementById('progress');
    const escapeHtml = value => String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    function render() {
      if (current >= quiz.length) {
        progress.textContent = '完了';
        container.innerHTML = `<div class="result"><h2>おつかれさまでした！</h2><p>${quiz.length}問中 <strong>${score}問正解</strong> でした。</p><button class="action" onclick="location.reload()">もう一度挑戦する</button></div>`;
        return;
      }
      const q = quiz[current]; answered = false;
      progress.textContent = `第 ${current + 1} 問 / ${quiz.length}問　正解数：${score}`;
      const image = q.image ? `<img class="question-image" src="${escapeHtml(q.image)}" alt="問題図版">` : '';
      const choices = q.choices.map((choice, i) => `<button class="choice" data-choice="${escapeHtml(choice)}"><strong>${letters[i]}.</strong> ${escapeHtml(choice)}</button>`).join('');
      container.innerHTML = `<p class="category">${escapeHtml(q.category)}</p>${image}<p class="prompt">${escapeHtml(q.prompt)}</p><div class="choices">${choices}</div><p id="feedback" class="feedback"></p><div class="actions"><button id="next" class="action" disabled>${current === quiz.length - 1 ? '結果を見る' : '次の問題へ →'}</button></div>`;
      container.querySelectorAll('.choice').forEach(button => button.addEventListener('click', () => answer(button, q.answer)));
      document.getElementById('next').addEventListener('click', () => { if (answered) { current += 1; render(); } });
    }
    function answer(button, correct) {
      if (answered) return;
      answered = true;
      const selected = button.dataset.choice;
      const ok = selected === correct;
      if (ok) score += 1;
      container.querySelectorAll('.choice').forEach(item => {
        item.disabled = true;
        if (item.dataset.choice === correct) item.classList.add('correct');
      });
      if (!ok) button.classList.add('incorrect');
      const feedback = document.getElementById('feedback');
      feedback.textContent = ok ? '正解です。' : `不正解です。正解：${correct}`;
      feedback.className = `feedback ${ok ? 'good' : 'bad'}`;
      document.getElementById('next').disabled = false;
      progress.textContent = `第 ${current + 1} 問 / ${quiz.length}問　正解数：${score}`;
    }
