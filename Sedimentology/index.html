<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>堆積学 試験対策ポータル</title>
<style>
    :root { --primary: #2c3e50; --accent: #c76d2d; --bg: #f4f7f6; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; text-align: center; }
    .back-link-btn { display: inline-block; margin-bottom: 15px; padding: 8px 16px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em; }
    header { margin-bottom: 30px; }
    h1 { color: var(--primary); margin: 0; font-size: 1.5rem; }
    p { color: #7f8c8d; font-size: 0.9rem; }
    .menu-grid { display: grid; gap: 15px; max-width: 600px; margin: 0 auto; }
    .menu-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: flex; align-items: center; transition: transform 0.2s; border-left: 6px solid var(--accent); }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
    .icon { font-size: 2.5rem; margin-right: 15px; }
    .text-area { text-align: left; }
    .title { font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 4px; color: var(--primary); }
    .desc { font-size: 0.85rem; color: #95a5a6; }
    footer { margin-top: 40px; font-size: 0.8rem; color: #bdc3c7; }
</style>
</head>
<body>
<header>
    <a href="../index.html" class="back-link-btn">🏠 ホームに戻る</a>

    <p>第1回〜第9回の要点を5択で確認</p>
</header>
<div class="menu-grid">
    <a href="mcq.html" class="menu-card">
        <div class="icon">🪨</div>
        <div class="text-area">
            <span class="title">5択クイズ 100問</span>
            <span class="desc">第10回を除外。ランダム出題・正誤表示付き。<br>授業内容の総復習に。</span>
        </div>
    </a>

    <a href="hard.html" class="menu-card">
        <div class="icon">🔥</div>
        <div class="text-area">
            <span class="title">難問チャレンジ 50問</span>
            <span class="desc">堆積相・堆積構造・環境の対応を問う応用問題。<br>理解度の最終確認に。</span>
        </div>
    </a>
</div>
<footer>Good luck on your exam!</footer>
</body>
</html>
